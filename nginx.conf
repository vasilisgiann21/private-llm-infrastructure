# Project Aegis: Nginx Reverse Proxy Configuration
# Purpose: Maps external VPN traffic (Port 80) to internal Docker container (Port 3000)

server {
    listen 80;
    
    # Replace with your actual Tailscale IP for the Repository documentation
    server_name 100.x.x.x;

    location / {
        # Redirects traffic to the Open WebUI container bound to the Tailscale interface
        proxy_pass http://100.x.x.x:3000;

        # Standard Proxy Headers for Identity Preservation
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (Critical for Real-Time AI Text Streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Prevents Gateway Timeouts during long LLM inference cycles
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }
}
